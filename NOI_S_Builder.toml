title = "Synthèse NOI_S"
description = "Rapports G2K (échantillons + profondeurs) et format de synthèse"
version = 1.0
author = "Antonin Plard"

# base_path : dossier des rapports, relatif au fichier build (CLI)
# ou au dossier de travail du serveur (Streamlit).
base_path = "./data/NOI_S"

# --- Échantillons : liste ORDONNÉE, avec la géométrie de couche (cm) --- #
# depth_top / depth_bot sont la source de données absente des rapports G2K.
# Profondeur = depth_top ; Epaisseur = depth_bot - depth_top.
# NOTE: profondeurs à ajuster avec les vraies valeurs de terrain.

[[samples]]
name = "NOI_S_1.txt"
depth_top = 0.0
depth_bot = 0.5

[[samples]]
name = "NOI_S_2.txt"
depth_top = 0.5
depth_bot = 1.0

[[samples]]
name = "NOI_S_3.txt"
depth_top = 1.0
depth_bot = 1.5

[[samples]]
name = "NOI_S_4.txt"
depth_top = 1.5
depth_bot = 2.0

[[samples]]
name = "NOI_S_5.txt"
depth_top = 2.0
depth_bot = 2.5

[[samples]]
name = "NOI_S_6.txt"
depth_top = 2.5
depth_bot = 3.0

[[samples]]
name = "NOI_S_7.txt"
depth_top = 3.0
depth_bot = 3.5

[[samples]]
name = "NOI_S_8.txt"
depth_top = 3.5
depth_bot = 4.0

[[samples]]
name = "NOI_S_9.txt"
depth_top = 4.0
depth_bot = 4.5

[[samples]]
name = "NOI_S_10.txt"
depth_top = 4.5
depth_bot = 5.0

[[samples]]
name = "NOI_S_11.txt"
depth_top = 5.0
depth_bot = 5.5

[[samples]]
name = "NOI_S_13.txt"
depth_top = 5.5
depth_bot = 6.0

[[samples]]
name = "NOI_S_16.txt"
depth_top = 6.0
depth_bot = 6.5

# --- Métadonnées (niveau carotte) --- #

[metadata]
base_year = 2018             # année de l'échantillon de surface (calcul d'âge)
taux_sedimentation = 0.2246  # cm/an, constante fournie (dérivée extérieurement pour l'instant)

# --- Nucléides : sources de mesure réutilisables (toujours des raies avec énergie) --- #

[nuclides.pb210]
peaks = [{ nuclide = "PB-210", energy = 46.54 }]

[nuclides.ra226]                # estimé via ses filles à l'équilibre séculaire
peaks = [
  { nuclide = "PB-214", energy = 295.21 },
  { nuclide = "PB-214", energy = 351.92 },
  { nuclide = "BI-214", energy = 609.31 },
]

[nuclides.am241]
peaks = [{ nuclide = "AM-241", energy = 59.54 }]

[nuclides.cs137]
peaks = [{ nuclide = "CS-137", energy = 661.66 }]  # la vraie raie, pas la ligne à 32 keV

[nuclides.k40]
peaks = [{ nuclide = "K-40", energy = 1460.82 }]

# --- Colonnes : ce qui est affiché, dans l'ordre du fichier --- #

[columns.pb210]
name = "PB-210"
source = "pb210"

[columns.ra226]
name = "RA-226"
source = "ra226"

[columns.pbexc]
name = "PB-Exc"
formula = "pb210 - ra226"       # arithmétique sur les clés de nucléide

[columns.am241]
name = "AM-241"
source = "am241"

[columns.cs137]
name = "CS-137"
source = "cs137"

[columns.k40]
name = "K-40"
source = "k40"
