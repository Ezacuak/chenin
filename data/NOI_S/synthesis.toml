title = "Synthèse NOI_S"
version = 1.0
author = "Antonin Plard"

[metadata]
base_year = 2018             # year of the surface sample (for age computation)
taux_sedimentation = 0.2246  # cm/yr, provided constant (derived externally for now)
epaisseur = 0.5              # default slice thickness (cm); profondeur cumulates this

[columns.pb210]
name = "PB-210"
provider = "report"          # taken directly from section 3 (46.5 keV peak)

[columns.ra226]
name = "RA-226"
provider = "mean"            # inverse-variance weighted mean over the peaks below
peaks = [
  { nuclide = "PB-214", energy = 295.21 },
  { nuclide = "PB-214", energy = 351.92 },
  { nuclide = "BI-214", energy = 609.31 },
]

[columns.pbexc]
name = "PB-Exc"
provider = "calculated"
formula = "PB-210 - RA-226"

[columns.am241]
name = "AM-241"
provider = "report"

[columns.cs137]
name = "CS-137"
provider = "report"
energy = 661.65             # pin the real peak, not the 32 keV line

[columns.k40]
name = "K-40"
provider = "report"
